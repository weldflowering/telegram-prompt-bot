name: Daily Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * *'  # 3:00 PM IST

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests
      - run: python bot.py

      - name: Save updated index
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add index.txt
          git commit -m "update index" || echo "no changes"
          git push
